name: Deploy to EKS
on:
  push:
    branches:
      - master

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

  setup-aws:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

  build-image:
    runs-on: ubuntu-latest
    needs: setup-aws
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build Docker image
        run: |
          docker build -t fastapi-app-new-image .
          docker tag fastapi-app-new-image:latest 038462775601.dkr.ecr.us-east-1.amazonaws.com/fastapi-app-repo

  login-ecr:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 038462775601.dkr.ecr.us-east-1.amazonaws.com

  push-image:
    runs-on: ubuntu-latest
    needs: login-ecr
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Push Docker image to ECR
        run: |
          docker push 038462775601.dkr.ecr.us-east-1.amazonaws.com/fastapi-app-repo

  deploy-eks:
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region us-east-1 --name fastapi-cluster
      - name: Deploy to EKS
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml